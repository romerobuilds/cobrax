services:
  db:
    image: postgres:16
    container_name: cobrax_postgres
    environment:
      POSTGRES_USER: cobrax
      POSTGRES_PASSWORD: "An@ly2904"
      POSTGRES_DB: cobrax
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cobrax_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: cobrax_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: cobrax_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
